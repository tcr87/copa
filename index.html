<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa 2026 - Domingo (14/06)</title>
    <style>
        /* Bloqueia o scroll para travar a tela no iPad 2 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding-bottom: 10px;
        }

        /* CABEÇALHO (Fundo Laranja, Letra Preta) */
        .header {
            background-color: #ff9900;
            color: #000000;
            padding: 20px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* CONTAINER DOS JOGOS */
        .conteudo {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
        }

        /* O JOGO */
        .jogo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 22%;
            border-bottom: 2px dashed #e6e6e6;
            box-sizing: border-box;
        }
        .jogo:last-child {
            border-bottom: none;
        }

        /* Colunas dos Países */
        .coluna-pais {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
            text-align: center;
        }

        .nome-pais {
            font-size: 2.1em;
            font-weight: bold;
            margin-top: 8px;
            color: #000000;
        }

        .bandeira {
            width: 110px;
            height: 73px;
            object-fit: cover;
            border: 2px solid #000000;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
        }

        /* Centro do Placar */
        .coluna-centro {
            width: 20%;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .x-separador {
            font-size: 2.3em;
            font-weight: bold;
            color: #999999;
            line-height: 1;
        }

        .hora-jogo {
            font-size: 2.1em;
            font-weight: 900;
            color: #ff5500;
            margin-top: 5px;
        }

        /* BOTÃO INFERIOR */
        .rodape {
            text-align: center;
            padding: 5px 0;
        }

        .btn-proximo {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #000000;
        }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <div class="header">
        DOMINGO, 14 DE JUNHO
    </div>

    <!-- Lista de Jogos -->
    <div class="conteudo">
        
        <!-- JOGO 1 -->
        <div class="jogo">
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Flag_of_Germany.svg/160px-Flag_of_Germany.svg.png" alt="Alemanha">
                <div class="nome-pais">Alemanha</div>
            </div>
            <div class="coluna-centro">
                <div class="x-separador">X</div>
                <div class="hora-jogo">14:00</div>
            </div>
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Flag_of_Cura%C3%A7ao.svg/160px-Flag_of_Cura%C3%A7ao.svg.png" alt="Curaçau">
                <div class="nome-pais">Curaçau</div>
            </div>
        </div>

        <!-- JOGO 2 -->
        <div class="jogo">
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Flag_of_the_Netherlands.svg/160px-Flag_of_the_Netherlands.svg.png" alt="Holanda">
                <div class="nome-pais">Holanda</div>
            </div>
            <div class="coluna-centro">
                <div class="x-separador">X</div>
                <div class="hora-jogo">17:00</div>
            </div>
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Flag_of_Japan.svg/160px-Flag_of_Japan.svg.png" alt="Japão">
                <div class="nome-pais">Japão</div>
            </div>
        </div>

        <!-- JOGO 3 -->
        <div class="jogo">
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Flag_of_C%C3%B4te_d%27Ivoire.svg/160px-Flag_of_C%C3%B4te_d%27Ivoire.svg.png" alt="Costa do Marfim">
                <div class="nome-pais">C. Marfim</div>
            </div>
            <div class="coluna-centro">
                <div class="x-separador">X</div>
                <div class="hora-jogo">20:00</div>
            </div>
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Flag_of_Ecuador.svg/160px-Flag_of_Ecuador.svg.png" alt="Equador">
                <div class="nome-pais">Equador</div>
            </div>
        </div>

        <!-- JOGO 4 -->
        <div class="jogo">
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Flag_of_Sweden.svg/160px-Flag_of_Sweden.svg.png" alt="Suécia">
                <div class="nome-pais">Suécia</div>
            </div>
            <div class="coluna-centro">
                <div class="x-separador">X</div>
                <div class="hora-jogo">23:00</div>
            </div>
            <div class="coluna-pais">
                <img class="bandeira" src="http://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Tunisia.svg/160px-Flag_of_Tunisia.svg.png" alt="Tunísia">
                <div class="nome-pais">Tunísia</div>
            </div>
        </div>

    </div>

    <!-- Botão para Segunda-feira -->
    <div class="rodape">
        <a href="15-06.html" class="btn-proximo">Ver Jogos de Segunda ➔</a>
    </div>

</body>
</html>
