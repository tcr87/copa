<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa 2026 - Quarta (24/06)</title>
    <style>
        /* Permite apenas o scroll vertical se houver necessidade pelo espaço físico */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding-bottom: 5px;
        }

        /* CABEÇALHO */
        .header {
            background-color: #ff9900;
            color: #000000;
            padding: 10px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* CONTAINER DOS JOGOS (Lista única vertical) */
        .conteudo {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        /* O JOGO (Compactado para caber mais linhas) */
        .jogo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 14%; /* Altura reduzida para acomodar as 6 linhas */
            border-bottom: 2px dashed #e6e6e6;
            box-sizing: border-box;
            position: relative;
            padding: 4px 0;
        }
        .jogo:last-child {
            border-bottom: none;
        }

        /* Identificador de Grupo */
        .grupo-tag {
            position: absolute;
            top: 1px;
            font-size: 0.8em;
            font-weight: bold;
            color: #888888;
            text-transform: uppercase;
        }

        /* Colunas dos Países (Zoom reduzido) */
        .coluna-pais {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
            text-align: center;
        }

        .nome-pais {
            font-size: 1.6em; /* Texto menor */
            font-weight: bold;
            margin-top: 4px;
            color: #000000;
        }

        .bandeira {
            width: 75px;  /* Tamanho reduzido */
            height: 50px; /* Tamanho reduzido */
            object-fit: cover;
            border: 2px solid #000000;
            box-shadow: 0px 3px 5px rgba(0,0,0,0.1);
        }

        /* Centro do Placar */
        .coluna-centro {
            width: 20%;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .x-separador {
            font-size: 1.8em;
            font-weight: bold;
            color: #999999;
            line-height: 1;
        }

        .hora-jogo {
            font-size: 1.6em;
            font-weight: 900;
            color: #ff5500;
            margin-top: 2px;
        }

        /* BOTÕES INFERIORES */
        .rodape {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 5px 0;
        }

        .btn-navegacao {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 18px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #000000;
        }
        .btn-navegacao:active {
            background-color: #ff9900;
            color: #000000;
        }
    </style>
</head>
<body>
