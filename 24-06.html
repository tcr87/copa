<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Copa 2026 - Quarta (24/06)</title>
    <style>
        /* Bloqueia o scroll para travar a tela no iPad 2 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding-bottom: 10px;
        }

        /* CABEÇALHO */
        .header {
            background-color: #ff9900;
            color: #000000;
            padding: 15px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* CONTAINER DOS JOGOS (Usando estrutura de tabela estável para o iPad 2) */
        .conteudo {
            flex-grow: 1;
            display: table;
            width: 100%;
            height: 100%;
            border-collapse: collapse;
        }

        .linha-horario {
            display: table-row;
            height: 33.33%;
        }

        /* O JOGO */
        .jogo {
            display: table-cell;
            width: 50%;
            text-align: center;
            vertical-align: middle;
            border-bottom: 2px dashed #e6e6e6;
            box-sizing: border-box;
            position: relative;
            padding: 10px 0;
        }
        
        /* Divisória vertical entre jogos do mesmo horário */
        .jogo:first-child {
            border-right: 2px dashed #e6e6e6;
        }

        .linha-horario:last-child .jogo {
            border-bottom: none;
        }

        /* Identificador de Grupo */
        .grupo-tag {
            position: absolute;
            top: 2px;
            left: 0;
            right: 0;
            font-size: 0.85em;
            font-weight: bold;
            color: #888888;
            text-transform: uppercase;
        }

        /* Estrutura interna do confronto */
        .confronto-container {
            display: table;
            width: 100%;
        }

        /* Colunas dos Países e Centro */
        .coluna-pais {
            display: table-cell;
            width: 42%;
            vertical-align: middle;
            text-align: center;
        }

        .coluna-centro {
            display: table-cell;
            width: 16%;
            vertical-align: middle;
            text-align: center;
        }

        .nome-pais {
            font-size: 1.6em;
            font-weight: bold;
            margin-top: 5px;
            color: #000000;
        }

        .bandeira {
            width: 85px;
            height: 57px;
            object-fit: cover;
            border: 2px solid #000000;
            box-shadow: 0px 3px 5px rgba(0,0,0,0.1);
        }

        .x-separador {
            font-size: 1.8em;
            font-weight: bold;
            color: #999999;
            line-height: 1;
        }

        .hora-jogo {
            font-size: 1.6em;
            font-weight: 900;
            color: #ff5500;
            margin-top: 3px;
        }

        /* BOTÕES INFERIORES */
        .rodape {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 5px 0;
        }

        .btn-navegacao {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #000000;
        }
        .btn-navegacao:active {
            background-color: #ff9900;
            color: #000000;
        }
    </style>
</head>
