<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="300">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa 2026 - Sábado (27/06)</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding-bottom: 5px;
        }

        .header {
            background-color: #ff9900;
            color: #000000;
            padding: 10px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .conteudo {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .jogo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 14%;
            border-bottom: 2px dashed #e6e6e6;
            box-sizing: border-box;
            position: relative;
            padding: 4px 0;
        }
        .jogo:last-child {
            border-bottom: none;
        }

        .grupo-tag {
            position: absolute;
            top: 1px;
            font-size: 0.8em;
            font-weight: bold;
            color: #888888;
            text-transform: uppercase;
        }

        .coluna-pais {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
            text-align: center;
        }

        .nome-pais {
            font-size: 1.6em;
            font-weight: bold;
            margin-top: 4px;
            color: #000000;
        }

        .bandeira {
            width: 75px;
            height: 50px;
            object-fit: cover;
            border: 2px solid #000000;
            box-shadow: 0px 3px 5px rgba(0,0,0,0.1);
        }

        .coluna-centro {
            width: 20%;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .x-separador {
            font-size: 1.8em;
            font-weight: bold;
            color: #999999;
            line-height: 1;
        }

        .hora-jogo {
            font-size: 1.6em;
            font-weight: 900;
            color: #ff5500;
            margin-top: 2px;
        }

        .rodape {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 5px 0;
        }

        .btn-navegacao {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 18px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #000000;
        }
        .btn-navegacao:active {
            background-color: #ff9900;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="header">
        SÁBADO, 27 DE JUNHO - 3ª RODADA
    </div>

    <div class="conteudo">
        
        <!-- JOGO 1 -->

                <div class="nome-pais">Panamá</div>
            </div>
            <div class="coluna-centro">
                <div class="x-separador">X</div>
                <div class="hora-jogo">18:00</div>
            </div>
            <div class="coluna-pais">
                <img class="bandeira" src="bandeiras/gb-eng.png" alt="Inglaterra">

        </div>

    </div>

    <div class="rodape">
